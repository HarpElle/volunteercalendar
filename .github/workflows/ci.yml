name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel previous runs of the same workflow on the same branch when a new
# commit lands — we only care about the latest state.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Lint (errors fail the build; warnings allowed)
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Set up Java for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Firestore rules tests (emulator)
        run: npm run test:rules

      - name: API integration tests (emulator)
        # Smokes write-API route handlers against the Firestore emulator
        # so missing composite indexes / role-gate regressions / cross-
        # collection rewrites fail CI before they hit production. Added
        # after PR #32's missing-index outage (POST /api/short-links).
        run: npm run test:integration

      - name: Production build
        # Provide stub env vars so SDK constructors that init at module-load
        # don't crash during page-data collection. None of these placeholder
        # values are used at runtime — they just keep the build from
        # throwing during static analysis.
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "ci:placeholder"
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder-not-a-real-key
          # Stripe SDK throws on empty apiKey at module-load. Use a
          # syntactically valid placeholder; no real API calls happen at
          # build time.
          STRIPE_SECRET_KEY: sk_test_ci_placeholder_not_a_real_key
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          RESEND_API_KEY: re_ci_placeholder_not_a_real_key
          TWILIO_ACCOUNT_SID: ""
          TWILIO_AUTH_TOKEN: ""
          TWILIO_PHONE_NUMBER: ""
          # Skip Sentry source-map upload in CI (no auth token).
          SENTRY_AUTH_TOKEN: ""
          SENTRY_DSN: ""
          NEXT_PUBLIC_SENTRY_DSN: ""
        run: npm run build

      - name: Smoke check — critical UI strings present in build output
        # Defense-in-depth against the PR #35 hot-reload class of bug
        # (volunteer-facing feature regressed to silent absence because a
        # TypeScript error broke the prod build but the merged PR slipped
        # through anyway). Each grep here pins a user-visible string that
        # MUST land in the built bundle. Adding a new check here is
        # ~1 line per surface that we care about regression-protecting.
        run: |
          set -e
          must_contain() {
            local pattern="$1"
            local label="$2"
            if grep -rq -- "$pattern" .next/static; then
              echo "OK: $label ('$pattern')"
            else
              echo "MISSING: $label ('$pattern')" >&2
              exit 1
            fi
          }
          must_contain "Open Slots" "Self-Service Open Slots tab on /dashboard/my-schedule (PR #35)"
          must_contain "Send Availability Request" "Schedules availability-request button (PR #27)"
          must_contain "Create a test link" "Short Links admin test-create form (PR #31)"
